
<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viktoria Paltar Boyaları – Peşəkar Nəticə</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #3dffa0; /* Neon Yaşıl */
    --bg-mint: #d8ffed; /* Göndərdiyiniz açıq yaşıl rəng */
    --black: #0a0a0a;
    --white: #ffffff;
    --radius: 24px;
  }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: var(--white); color: var(--black); overflow-x: hidden; }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 24px; background: rgba(61,255,160,0.85);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  }
  .nav-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; color: var(--black); text-decoration: none; display: flex; align-items: center; gap: 10px; }

  /* HERO */
  .hero {
    min-height: 80vh;
    background: linear-gradient(180deg, var(--green) 0%, var(--white) 100%);
    display: flex; flex-direction: column; overflow: hidden; padding-top: 70px;
  }
  .marquee-row { overflow: hidden; line-height: 1; }
  .marquee-track { display: flex; white-space: nowrap; animation: mq-left 30s linear infinite; }
  @keyframes mq-left { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
  .marquee-text { font-family: 'Syne', sans-serif; font-weight: 800; font-size: clamp(60px, 15vw, 120px); padding: 0 20px; }

  /* ══ STACK CAROUSEL BÖLMƏSİ ══ */
  .carousel-section { 
    padding: 80px 24px; 
    background-color: var(--bg-mint); /* Göndərdiyiniz rəng */
    display: flex; flex-direction: column; align-items: center;
  }

  .stack-area { 
    position: relative; 
    width: 260px; 
    height: 340px; 
    cursor: grab; 
    user-select: none;
    touch-action: pan-y; /* Sürüşdürmə zamanı səhifənin yuxarı-aşağı qaçmaması üçün */
  }
  .stack-area:active { cursor: grabbing; }

  .scard {
    position: absolute; inset: 0; border-radius: 24px; overflow: hidden;
    box-shadow: 0 15px 45px rgba(0,0,0,0.1);
    transition: transform .5s cubic-bezier(.2, .8, .2, 1), opacity .5s;
    background: var(--green); /* Kartın daxili neon yaşıl */
    border: 2px solid rgba(0,0,0,0.05);
    will-change: transform;
  }

  /* Şəkil tam görünməsi üçün contain */
  .scard .fill { 
    width: 100%; height: 75%; 
    background-size: contain; 
    background-position: center; 
    background-repeat: no-repeat;
    background-color: var(--green); /* Şəkil olmayan boşluqlar neon yaşıl qalsın */
  }

  .scard .meta { 
    height: 25%; background: var(--green); 
    display: flex; flex-direction: column; justify-content: center; 
    padding: 0 16px; border-top: 1px solid rgba(0,0,0,0.05);
  }
  .scard .meta .nm { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 800; color: #000; }
  .scard .meta .no { font-size: 12px; font-weight: 500; color: rgba(0,0,0,0.5); }

  /* Kartların qat-qat duruşu */
  .scard[data-pos="0"] { transform: translate(0, 0) rotate(0deg); z-index: 5; opacity: 1; }
  .scard[data-pos="1"] { transform: translate(12px, -10px) rotate(3deg); z-index: 4; opacity: 0.9; }
  .scard[data-pos="2"] { transform: translate(24px, -20px) rotate(6deg); z-index: 3; opacity: 0.8; }
  .scard[data-pos="3"] { transform: translate(36px, -30px) rotate(9deg); z-index: 2; opacity: 0.7; }

  /* Uçub getmə animasiyası */
  .scard.fly-away {
    transform: translate(-150%, 50px) rotate(-20deg) !important;
    opacity: 0 !important;
  }

  /* İnfo və Düymələr */
  .carousel-controls { text-align: center; margin-top: 30px; }
  .ci-name { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; margin-bottom: 5px; }
  .ci-num { color: #888; font-size: 14px; margin-bottom: 20px; }
  .ci-btns { display: flex; gap: 15px; justify-content: center; }
  .ci-btn {
    width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--black);
    background: transparent; color: var(--black); font-size: 20px; cursor: pointer;
    transition: 0.3s; display: flex; align-items: center; justify-content: center;
  }
  .ci-btn:hover { background: var(--black); color: var(--white); }

  /* COLORS GRID */
  .color-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; padding: 40px 20px; background: #000; }
  .color-cell { aspect-ratio: 1; border-radius: 8px; cursor: pointer; }

  @media (max-width: 600px) {
    .stack-area { width: 220px; height: 300px; }
    .color-grid { grid-template-columns: repeat(4, 1fr); }
  }
</style>
</head>
<body>

<nav>
  <a href="#" class="nav-logo">VIKTORIA</a>
</nav>

<section class="hero">
  <div class="marquee-row"><div class="marquee-track"><span class="marquee-text">VİKTORİA PALTAR BOYALARI</span><span class="marquee-text">VİKTORİA PALTAR BOYALARI</span></div></div>
</section>

<section class="carousel-section">
  <div class="stack-area" id="stackArea"></div>
  
  <div class="carousel-controls">
    <div id="activeName" class="ci-name">—</div>
    <div id="activeNum" class="ci-num">—</div>
    <div class="ci-btns">
      <button class="ci-btn" id="btnPrev">←</button>
      <button class="ci-btn" id="btnNext">→</button>
    </div>
  </div>
</section>

<div class="color-grid" id="colorGrid"></div>

<script>
const COLORS = [
  { n:"Qara", bg:"#1c1c1c", img:"30-siyah.webp" },
  { n:"Tünd Göy", bg:"#002a5c", img:"51-lacivert-koyu.webp" },
  { n:"Qırmızı", bg:"#cc0000", img:"8-kirmizi.webp" },
  { n:"Yaşıl", bg:"#1a6e00", img:"38-yesil.webp" },
  { n:"Sarı", bg:"#f0d000", img:"11-sari.webp" },
  { n:"Bənövşəyi", bg:"#6600cc", img:"" },
  { n:"Qəhvəyi", bg:"#5c3317", img:"" }
];

const area = document.getElementById('stackArea');
let queue = COLORS.map((_, i) => i);
let busy = false;

// KARTLARI YARATMAQ
function buildStack() {
  area.innerHTML = '';
  const visible = Math.min(4, queue.length);
  for (let i = visible - 1; i >= 0; i--) {
    const col = COLORS[queue[i]];
    const card = document.createElement('div');
    card.className = 'scard';
    card.dataset.pos = i;

    const fillStyle = col.img ? `background-image:url('${col.img}');` : `background:linear-gradient(135deg, ${col.bg}, #000);`;

    card.innerHTML = `
      <div class="fill" style="${fillStyle}"></div>
      <div class="meta">
        <div class="nm">${col.n}</div>
        <div class="no">№${String(queue[i]+1).padStart(2,'0')} — Viktoria</div>
      </div>`;
    area.appendChild(card);
  }
  
  const active = COLORS[queue[0]];
  document.getElementById('activeName').textContent = active.n;
  document.getElementById('activeNum').textContent = '№' + String(queue[0]+1).padStart(2,'0') + ' — Viktoria';
}

// HƏRƏKƏT FUNKSİYALARI
function next() {
  if (busy) return;
  busy = true;
  const topCard = area.querySelector('.scard[data-pos="0"]');
  if (topCard) topCard.classList.add('fly-away');
  
  setTimeout(() => {
    queue.push(queue.shift());
    buildStack();
    busy = false;
  }, 400);
}

function prev() {
  if (busy) return;
  queue.unshift(queue.pop());
  buildStack();
}

// SWIPE (SÜRÜŞDÜRMƏ) MƏNTİQİ
let startX = 0;
area.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, {passive: true});
area.addEventListener('touchend', e => {
  let endX = e.changedTouches[0].clientX;
  let diff = startX - endX;
  if (diff > 50) next(); // Sola çəkəndə növbəti
  if (diff < -50) prev(); // Sağa çəkəndə əvvəlki
}, {passive: true});

// MOUSE İLƏ SÜRÜŞDÜRMƏ (PC ÜÇÜN)
area.addEventListener('mousedown', e => { startX = e.clientX; });
area.addEventListener('mouseup', e => {
  let endX = e.clientX;
  let diff = startX - endX;
  if (Math.abs(diff) > 50) {
    if (diff > 0) next(); else prev();
  }
});

// DÜYMƏLƏR
document.getElementById('btnNext').onclick = next;
document.getElementById('btnPrev').onclick = prev;

// GRID
const grid = document.getElementById('colorGrid');
COLORS.forEach((c) => {
  const cell = document.createElement('div');
  cell.className = 'color-cell';
  cell.style.backgroundColor = c.bg;
  grid.appendChild(cell);
});

buildStack();
</script>

</body>
</html>
