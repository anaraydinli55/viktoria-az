    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Space+Grotesk:wght@300;500&display=swap" rel="stylesheet">

    <style>
        /* AEON.XYZ RƏNG VƏ DİZAYN SİSTEMİ */
        :root {
            --bg: #000000;
            --bg-offset: #080808;
            --accent: #00f2ff; /* Aeon Firuzəyi Glow */
            --accent-soft: rgba(0, 242, 255, 0.15);
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-dim: #a1a1a1;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; cursor: crosshair; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* 1. ANIMATED MESH BACKGROUND (AEON STYLE) */
        .mesh-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2; overflow: hidden; background: var(--bg);
        }
        .mesh-gradient {
            position: absolute; width: 140%; height: 140%;
            top: -20%; left: -20%;
            background-image: 
                radial-gradient(circle at 20% 30%, #001a1a 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, #0a001a 0%, transparent 40%);
            animation: meshMove 20s ease-in-out infinite alternate;
            filter: blur(80px);
        }
        @keyframes meshMove {
            from { transform: rotate(0deg) scale(1); }
            to { transform: rotate(5deg) scale(1.1); }
        }

        /* 2. GRID OVERLAY (AEON PIXEL SYSTEM) */
        .grid-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(var(--border) 1px, transparent 1px),
                              linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: -1;
            pointer-events: none;
        }

        /* NAVIGATION */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 30px 50px; position: fixed; width: 100%; top: 0;
            z-index: 1000; border-bottom: 1px solid var(--border);
            backdrop-filter: blur(20px); background: rgba(0,0,0,0.5);
        }
        .logo { font-weight: 900; font-size: 20px; letter-spacing: -1px; }
        .nav-links { display: flex; gap: 40px; }
        .nav-links a { 
            text-decoration: none; color: var(--text-dim); font-size: 12px; 
            font-weight: 700; text-transform: uppercase; letter-spacing: 2px;
            transition: 0.3s;
        }
        .nav-links a:hover { color: var(--accent); text-shadow: 0 0 10px var(--accent); }

        /* FULLSCREEN HERO */
        .hero {
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            border-bottom: 1px solid var(--border);
        }
        .hero-tag {
            font-family: 'Space Grotesk', monospace;
            color: var(--accent); font-size: 11px; letter-spacing: 6px;
            text-transform: uppercase; margin-bottom: 30px;
            padding: 8px 20px; border: 1px solid var(--accent);
            border-radius: 100px; background: var(--accent-soft);
        }
