name: Update Existing HTML Pages
on:
  push:
    branches:
      - main

jobs:
  update-seo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Run Update Script
        run: node scripts/update-pages.js

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub SEO Optimizer"
          git config --global user.email "seo-bot@viktoria-az.store"
          git add .
          git commit -m "SEO: Meta tags and content updated for 120 pages" || exit 0
          git push
