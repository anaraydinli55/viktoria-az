name: Fix AZ WhatsApp Icons

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-az-icons:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fix AZ WhatsApp icons
        run: python3 .github/scripts/fix_az_icons.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet || git commit -m "fix: remove duplicate WhatsApp icon from AZ pages"
          git push
