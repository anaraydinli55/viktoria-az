name: Fix WhatsApp & Music Icons
 
on:
  workflow_dispatch:
 
jobs:
  fix-icons:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
 
      - name: Apply icons to all dlya-odejdy pages
        run: python3 .github/scripts/fix_icons.py
 
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ru/
          git diff --cached --quiet || git commit -m "fix: WhatsApp & music icons on all dlya-odejdy pages"
          git push
