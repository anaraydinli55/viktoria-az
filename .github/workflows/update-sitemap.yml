name: Update Sitemap URLs

on:
  workflow_dispatch:

jobs:
  update-sitemap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: List repo files for debugging
        run: ls -la

      - name: Replace old blog URLs with new ones
        run: |
          sed -i 's|https://viktoria-az.store/bloq10.html|https://viktoria-az.store/paltarlarin-evde-renglenmesi|g' sitemap.xml
          sed -i 's|https://viktoria-az.store/bloq9.html|https://viktoria-az.store/qara-sinka-paltar-uchun|g' sitemap.xml
          sed -i 's|https://viktoria-az.store/bloq8.html|https://viktoria-az.store/geyim-ve-tekstil-boyasi|g' sitemap.xml
          sed -i 's|https://viktoria-az.store/bloq7.html|https://viktoria-az.store/paltar-boyasi-hardan-almaq-olar|g' sitemap.xml
          sed -i 's|https://viktoria-az.store/bloq6.html|https://viktoria-az.store/paltar-boyasi-online-sifaris|g' sitemap.xml
          sed -i 's|https://viktoria-az.store/bloq5.html|https://viktoria-az.store/boyanin-istifade-qaydalari|g' sitemap.xml
          sed -i 's|https://viktoria-az.store/bloq4.html|https://viktoria-az.store/qaliciliga-tesir-eden-amiller|g' sitemap.xml
          sed -i 's|https://viktoria-az.store/bloq3.html|https://viktoria-az.store/sabitlesdirici-nece-istifade-olunur|g' sitemap.xml
          sed -i 's|https://viktoria-az.store/bloq2.html|https://viktoria-az.store/paltaryuyan-masinda-istifade-qaydalari|g' sitemap.xml
          sed -i 's|https://viktoria-az.store/bloq1.html|https://viktoria-az.store/qabda-boyama-telimati|g' sitemap.xml

      - name: Commit and push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add sitemap.xml
          git commit -m "Update sitemap blog URLs" || echo "No changes to commit"
          git push
