name: SEO Auto-Optimizer
on:
  push:
    branches:
      - main

jobs:
  seo-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Run Update Script
        run: node .github/scripts/update-pages.js

      - name: Commit and Push changes
        run: |
          git config --global user.name "SEO Bot"
          git config --global user.email "seo@viktoria-az.store"
          git add .
          git commit -m "SEO: Meta, Title and Intro optimized for 120 pages" || exit 0
          git push
