name: Catalog Image Links Builder (AZ + RU)

on:
  workflow_dispatch:

jobs:
  link-catalog:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install cheerio
        run: npm install cheerio --no-save

      - name: Run linking script
        run: |
          cp .github/scripts/link-catalog-images.js ./link-catalog-images.js
          node link-catalog-images.js
          rm link-catalog-images.js

      - name: Commit and Push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add catalog/index.html ru/catalog/index.html
          git diff --cached --quiet \
            && echo "Deyisiklik yoxdur, commit atlanir." \
            || git commit -m "feat: AZ + RU catalog images linked to product pages [auto]"
          git push
