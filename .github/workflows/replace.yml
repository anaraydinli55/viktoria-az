    python3 << 'EOF'
    import os
    import re

    # 🔥 BURADA FAYLLARI TAM YOL İLƏ YAZ
    TARGET_FILES = [
        "viktoria-cehrayi-paltar-boyasi/index.html"
    ]

    def replace_text(content):
        # URL-lər (case insensitive)
        content = re.sub(r'viktoria-qara', 'viktoria-cehrayi', content, flags=re.IGNORECASE)

        # Böyük hərf ilə başlayan
        content = re.sub(r'\bQara\b', 'Çəhrayı', content)

        # Tam böyük
        content = re.sub(r'\bQARA\b', 'ÇƏHRAYI', content)

        # Kiçik
        content = re.sub(r'\bqara\b', 'çəhrayı', content)

        return content

    for file in TARGET_FILES:
        if not os.path.exists(file):
            print(f"❌ Tapılmadı: {file}")
            continue

        try:
            with open(file, 'r', encoding='utf-8') as f:
                content = f.read()

            new_content = replace_text(content)

            if content != new_content:
                with open(file, 'w', encoding='utf-8') as f:
                    f.write(new_content)
                print(f"✅ Dəyişdirildi: {file}")
            else:
                print(f"➖ Dəyişiklik yoxdur: {file}")

        except Exception as e:
            print(f"⚠️ Xəta: {file} → {e}")
    EOF
