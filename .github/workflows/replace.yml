name: Auto Replace Text

on:
  push:
    branches:
      - main

jobs:
  replace:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run replace script
        run: |
          python3 <<'EOF'
          import os
          import re

          TARGET_FILES = [
              "viktoria-cehrayi-paltar-boyasi/index.html"
          ]

          def replace_text(content):
              content = re.sub(r'viktoria-qara', 'viktoria-cehrayi', content, flags=re.IGNORECASE)
              content = re.sub(r'\bQara\b', 'Çəhrayı', content)
              content = re.sub(r'\bQARA\b', 'ÇƏHRAYI', content)
              content = re.sub(r'\bqara\b', 'çəhrayı', content)
              return content

          for file in TARGET_FILES:
              if not os.path.exists(file):
                  print(f"❌ Tapılmadı: {file}")
                  continue

              with open(file, "r", encoding="utf-8") as f:
                  content = f.read()

              new_content = replace_text(content)

              if content != new_content:
                  with open(file, "w", encoding="utf-8") as f:
                      f.write(new_content)
                  print(f"✅ Dəyişdirildi: {file}")
              else:
                  print(f"➖ Dəyişiklik yoxdur: {file}")
          EOF

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .
          git diff --cached --quiet || git commit -m "Auto replace text"
          git push
