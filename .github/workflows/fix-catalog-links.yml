name: Fix Catalog Links

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fix catalog.html links
        run: python3 .github/scripts/fix_catalog_links.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "fix: replace catalog.html links with /catalog"
          git push
