name: Convert Images to WebP

on:
  workflow_dispatch:  # Manuel tetikleme (butona bas)
  push:
    paths:
      - 'images/**.jpg'
      - 'images/**.jpeg'
      - 'images/**.png'

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install cwebp
        run: sudo apt install webp -y

      - name: Convert all images to WebP
        run: |
          find images/ -type f \( -iname "*.jpg" -o -iname "*.jpeg" -o -iname "*.png" \) | while read f; do
            out="${f%.*}.webp"
            if [ ! -f "$out" ]; then
              echo "Converting: $f → $out"
              cwebp -q 82 "$f" -o "$out"
            else
              echo "Skipping (already exists): $out"
            fi
          done

      - name: Commit WebP files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add images/*.webp
          git diff --cached --quiet && echo "Nothing to commit" || git commit -m "Auto: Convert images to WebP"
          git push
