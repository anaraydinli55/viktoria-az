name: Convert Images to WebP

on:
  push:
    branches: [ main ]
    paths:
      - '**.jpg'
      - '**.jpeg'
      - '**.png'
  workflow_dispatch:

jobs:
  convert-webp:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cwebp
        run: sudo apt-get install -y webp

      - name: Convert JPG/JPEG/PNG to WebP
        run: |
          find . -type f \( -iname "*.jpg" -o -iname "*.jpeg" -o -iname "*.png" \) \
            ! -path "./.git/*" \
            ! -name "favicon*" \
            ! -name "apple-touch-icon*" | while read file; do
            output="${file%.*}.webp"
            cwebp -q 82 "$file" -o "$output"
            echo "✅ Çevrildi: $file → $output"
          done

      - name: Commit and push WebP files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "🖼️ WebP şəkilləri avtomatik əlavə edildi"
          git push
