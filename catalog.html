<style>

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* HEADER */
  header { background: var(--purple); padding: 8px 16px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 16px rgba(0,0,0,0.18); }
  nav { max-width: 960px; margin: 0 auto; display: flex; align-items: center; gap: 4px; flex-wrap: wrap; justify-content: center; }
  nav a { color: rgba(255,255,255,0.85); text-decoration: none; font-weight: 500; font-size: 13px; padding: 5px 10px; border-radius: 8px; transition: background 0.15s, color 0.15s; white-space: nowrap; }
  nav a:hover { background: rgba(255,255,255,0.12); color: #fff; }

  /* PAGE */
  .page { max-width: 960px; margin: 0 auto; padding: 28px 16px 100px; }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(22px, 4vw, 32px);
    color: var(--purple);
    text-align: center;
    margin-bottom: 24px;
  }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 14px;
    margin-bottom: 32px;
  }

  .card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--card-shadow);
    padding: 12px;
    text-align: center;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .card:hover { transform: translateY(-3px); box-shadow: 0 8px 28px rgba(75,0,130,0.16); }

  .card img {
    width: 100%;
    height: auto;
    border-radius: 12px;
    cursor: pointer;
    display: block;
  }

  .price {
    color: var(--purple);
    font-weight: 700;
    font-size: 14px;
    margin-top: 8px;
    line-height: 1.4;
  }

  /* NAV BUTTONS */
  .nav-buttons { display: flex; gap: 10px; margin-top: 8px; }
  .nav-btn {
    flex: 1; display: flex; align-items: center; justify-content: center;
    text-align: center; padding: 14px 8px; background: var(--purple); color: #fff;
    text-decoration: none; border-radius: 12px; font-weight: 700; font-size: 15px;
    box-shadow: 0 4px 16px rgba(75,0,130,0.20); transition: background 0.2s, transform 0.15s; min-width: 0;
  }
  .nav-btn:hover { background: var(--purple-dark); transform: translateY(-2px); }

  /* WHATSAPP */
  .wa-btn {
    position: fixed; bottom: 20px; right: 20px; background: #25D366;
    text-decoration: none; padding: 14px; border-radius: 50%;
    box-shadow: 0 6px 24px rgba(37,211,102,0.45); z-index: 999;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s, box-shadow 0.15s;
    animation: waPulse 2.5s ease-in-out infinite;
  }
  .wa-btn:hover { transform: scale(1.1); box-shadow: 0 10px 32px rgba(37,211,102,0.55); animation: none; }
  .wa-btn svg { width: 32px; height: 32px; fill: #fff; display: block; }
  @keyframes waPulse {
    0%,100%{ box-shadow: 0 4px 20px rgba(37,211,102,0.45); }
    50%{ box-shadow: 0 4px 32px rgba(37,211,102,0.75); }
  }

  @media (max-width: 480px) {
    .grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
    .nav-btn { font-size: 13px; padding: 12px 6px; }
