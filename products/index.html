      font-weight: bold;

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 20px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .btn {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 12px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.2s;
      font-size: 13px;
      text-align: center;
      border: none;
      cursor: pointer;
    }
    .btn:hover {
      transform: scale(1.05);
      filter: brightness(1.15);
    }
    @media (max-width: 480px) {
      .grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }
      .btn {
        font-size: 11px;
        padding: 10px;
      }
    }
