<!DOCTYPE html>
<html lang="az">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Viktoria Paltar Boyaları Kataloq</title>
  <meta name="description" content="Viktoria paltar boyası kataloqu." />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0713;
      color: #fff;
    }

    header {
      text-align: center;
      padding: 18px;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .btn {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 12px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: bold;
      color: #fff;
      background: linear-gradient(90deg, #4b0082, #b400ff);
      transition: 0.2s;
      font-size: 13px;
      text-align: center;
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 20px rgba(180,0,255,0.25);
    }

    @media (max-width: 480px) {
      .grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }

      .btn {
        font-size: 11px;
        padding: 10px;
      }
    }
  </style>
</head>
