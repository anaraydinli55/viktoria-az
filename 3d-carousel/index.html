  .c-card img {

    display: block;
    border-radius: 20px;
    pointer-events: none;
    user-select: none;
    -webkit-user-drag: none;
  }

  /* position classes */
  .c-card[data-pos="0"] {
    transform: translateX(0) rotateY(0deg) scale(1) translateZ(80px);

/* ========== 3D CAROUSEL ========== */
(function () {
  const stage      = document.getElementById('carouselStage');
  const label      = document.getElementById('carouselLabel');
  const counter    = document.getElementById('carouselCounter');
  const playBtn    = document.getElementById('playBtn');
  const prevBtn    = document.getElementById('prevBtn');
  const nextBtn    = document.getElementById('nextBtn');
  const progressBar = document.getElementById('progressBar');

  const total    = colors.length;
  const INTERVAL = 2000; // ms per slide
  const VISIBLE  = 5;    // positions: -2 -1 0 1 2

  let current   = 0;
  let playing   = true;
  let timer     = null;
  let progTimer = null;
  let progStart = null;

  // Build card pool (we reuse a fixed set of DOM nodes)
  const pool = [];
  for (let i = 0; i < total; i++) {
    const card = document.createElement('div');
    card.className = 'c-card';
    const img = document.createElement('img');
    img.src = `images/${colors[i].file}`;
    img.alt = colors[i].color;
    img.loading = i < 6 ? 'eager' : 'lazy';
    img.decoding = 'async';
    img.draggable = false;
    card.appendChild(img);
    card.addEventListener('click', () => {
      const pos = parseInt(card.dataset.pos);
      if (pos === -1) goTo(mod(current - 1, total));
      else if (pos === 1) goTo(mod(current + 1, total));
      else if (pos === 0) window.location.href = colors[current].link || '/boyama-qaydalari.html';
    });
    pool.push(card);
    stage.appendChild(card);
  }

  function mod(n, m) { return ((n % m) + m) % m; }

  function render() {
    // assign positions to each card
    for (let i = 0; i < total; i++) {
      let delta = i - current;
      // wrap around
      if (delta > total / 2)  delta -= total;
      if (delta < -total / 2) delta += total;

      let pos;
      if (delta === 0)       pos = '0';
      else if (delta === -1) pos = '-1';
      else if (delta === 1)  pos = '1';
      else if (delta === -2) pos = '-2';
      else if (delta === 2)  pos = '2';
      else if (delta < -2)   pos = 'hidden-left';
      else                   pos = 'hidden-right';

      pool[i].dataset.pos = pos;
    }
    label.textContent = colors[current].color;
    counter.textContent = `${current + 1} / ${total}`;
  }

  function goTo(idx) {
    current = mod(idx, total);
    render();
    resetProgress();
  }

  function next() { goTo(mod(current + 1, total)); }
  function prev() { goTo(mod(current - 1, total)); }

  /* Progress bar */
  function startProgress() {
    progStart = performance.now();
    progressBar.style.transition = `width ${INTERVAL}ms linear`;
    progressBar.style.width = '100%';
  }
  function resetProgress() {
    progressBar.style.transition = 'none';
    progressBar.style.width = '0%';
    if (playing) {
      requestAnimationFrame(() => requestAnimationFrame(startProgress));
    }
  }

  /* Auto-play */
  function startAuto() {
    clearInterval(timer);
    timer = setInterval(next, INTERVAL);
    startProgress();
    playing = true;
    playBtn.textContent = '⏸';
  }
  function stopAuto() {
    clearInterval(timer);
    progressBar.style.transition = 'none';
    progressBar.style.width = '0%';
    playing = false;
    playBtn.textContent = '▶';
  }

  playBtn.addEventListener('click', () => {
    if (playing) stopAuto(); else startAuto();
  });
  nextBtn.addEventListener('click', () => { next(); if (playing) { clearInterval(timer); timer = setInterval(next, INTERVAL); resetProgress(); } });
  prevBtn.addEventListener('click', () => { prev(); if (playing) { clearInterval(timer); timer = setInterval(next, INTERVAL); resetProgress(); } });

  /* Touch/swipe */
  let touchX = null;
  stage.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; }, { passive: true });
  stage.addEventListener('touchend', e => {
    if (touchX === null) return;
    const dx = e.changedTouches[0].clientX - touchX;
    if (Math.abs(dx) > 40) { dx < 0 ? next() : prev(); }
    touchX = null;
  });

  /* Init */
  render();
  startAuto();
})();

</button>

<script>
(function() {
  const music = document.getElementById('bgMusic');
  const btn   = document.getElementById('muteBtn');
  music.volume = 0.25;
  function playMusic() {
    music.play().then(function() { btn.textContent = '🔊'; }).catch(function(e) { console.warn('Audio blocked:', e); });
  }
  window.addEventListener('scroll', function() { if (music.paused) playMusic(); }, { once: true, passive: true });
  window.toggleMute = function() {
    if (music.paused) { playMusic(); } else { music.pause(); btn.textContent = '🔇'; }
  };
})();
</script>
