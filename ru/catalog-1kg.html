  (function() {

    music.volume = 0.25;
    function playMusic() {
      music.play().then(function() { btn.textContent = '🔊'; }).catch(function(e) { console.warn('Audio blocked:', e); });
    }
    window.addEventListener('scroll', function() { if (music.paused) playMusic(); }, { once: true, passive: true });

      if (music.paused) { playMusic(); } else { music.pause(); btn.textContent = '🔇'; }

  })();
